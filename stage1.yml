---
- name: Fedora Post-Install Setup - Stage 1 - Initial Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Prerequired tasks ---
    - name: DNF | Install dnf-plugins-core
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      tags: [system, dnf]
    
    - name: Shell | Get home directory of the primary user
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_env.SUDO_USER }}"
      register: primary_user_data
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz, hardware, asus, setup]
    
    - name: Shell | Get users information
      ansible.builtin.debug:
        msg: 
          - "Current User ID (ansible_user_id): {{ ansible_user_id }}"
          - "Sudo User (ansible_env.SUDO_USER): {{ ansible_env.SUDO_USER | default('None') }}"
      tags: [shell, omz, debug]
    
    # --- DNF Configurations ---
    - name: System | Optimize DNF Configuration
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        line: "{{ item.key }}={{ item.value }}"
        state: present
      loop:
        - { key: "max_parallel_downloads", value: "{{ dnf_max_parallel_downloads }}" }
        - { key: "fastestmirror", value: "{{ dnf_fastestmirror }}" }
      tags: [system, dnf]
    
    - name: System | Add RPM Fusion repositories
      ansible.builtin.dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes
      tags: [system, rpmfusion]
    
    # --- System tasks
    - name: System | Upgrade all packages and refresh dnf cache
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes
      become: true
      tags: [system, dnf]
      
    # --- Zsh and Oh-My-Zsh ---
    - name: ZSH | Install ZSH, Git, and Curl
      ansible.builtin.dnf:
        name: [zsh, git, curl, fira-code-fonts]
        state: present
      tags: [shell, omz, zsh, dnf]

    - name: ZSH | Identify target users (Sudo User + Root)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
          - name: "{{ ansible_env.SUDO_USER }}"
            home: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz]

    - name: ZSH | Identify target users (Root only)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
      when: ansible_env.SUDO_USER is not defined or ansible_env.SUDO_USER == 'root'
      tags: [shell, omz]

    - name: ZSH | Ensure Oh-My-Zsh is installed for users
      ansible.builtin.shell:
        cmd: "curl -fsSL {{ omz_install_script_url }} | sh -s -- --unattended --keep-zshrc"
        creates: "{{ item.home }}/.oh-my-zsh"
      become_user: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Ensure .zshrc exists (copy template if missing)
      ansible.builtin.copy:
        src: "{{ item.home }}/.oh-my-zsh/templates/zshrc.zsh-template"
        dest: "{{ item.home }}/.zshrc"
        remote_src: yes
        owner: "{{ item.name }}"
        mode: '0644'
        force: no
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Change default shell to ZSH
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: /bin/zsh
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Download custom theme for users
      ansible.builtin.get_url:
        url: "{{ omz_theme_url }}"
        dest: "{{ item.home }}/.oh-my-zsh/themes/{{ omz_theme_name }}.zsh-theme"
        owner: "{{ item.name }}"
        mode: '0644'
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Set theme in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ item.home }}/.zshrc"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="{{ omz_theme_name }}"'
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Add custom aliases to .zshrc
      ansible.builtin.blockinfile:
        path: "{{ item.home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED ALIASES"
        block: "{{ zsh_aliases }}"
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: ZSH | Add NVIDIA and API key placeholders to .zshrc
      ansible.builtin.blockinfile:
        path: "{{ item.home }}/.zshrc"
        marker: "# {mark} NVIDIA AND API CONFIGURATION"
        insertafter: '^# export MANPATH="/usr/local/man:\$MANPATH"'
        block: |
          # Finer-Grained Control of GLX + OpenGL
          #export __NV_PRIME_RENDER_OFFLOAD_PROVIDER=NVIDIA-G0
          #export __GLX_VENDOR_LIBRARY_NAME=nvidia
          #export __NV_PRIME_RENDER_OFFLOAD=1

          # API KEYS Configuration
        owner: "{{ item.name }}"
        mode: '0644'
      loop: "{{ zsh_users }}"
      tags: [shell, nvidia, setup]

    # --- GRUB Configuration ---
    - name: System | Configure GRUB settings
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^{{ item.key }}='
        line: '{{ item.key }}={{ item.value }}'
        state: present
      loop:
        - { key: "GRUB_TIMEOUT", value: "{{ grub_timeout }}" }
        - { key: "GRUB_TERMINAL_OUTPUT", value: '"{{ grub_terminal_output }}"' }
        - { key: "GRUB_GFXPAYLOAD", value: '"{{ grub_gfxpayload }}"' }
        - { key: "GRUB_GFXMODE", value: '"{{ grub_gfxmode }}"' }
      notify: Regenerate GRUB
      tags: [system, grub]

  handlers:
    - name: Regenerate GRUB
      ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
