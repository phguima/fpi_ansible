---
- name: Fedora Post-Install Setup - Stage NVIDIA - Proprietary Driver Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Repository Configuration ---
    - name: System | Enable fedora-cisco-openh264 repository (Fedora 41+)
      ansible.builtin.shell: dnf config-manager setopt fedora-cisco-openh264.enabled=1
      changed_when: false
      tags: [nvidia, repo]

    # --- Signing Prerequisites ---
    - name: NVIDIA | Install signing prerequisites
      ansible.builtin.dnf:
        name: "{{ nvidia_prerequisite_packages }}"
        state: present
      tags: [nvidia, prerequisites]

    - name: NVIDIA | Check if akmod public key exists
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: akmod_cert
      tags: [nvidia, cert]

    - name: NVIDIA | Generate MOK key for signing
      ansible.builtin.command: kmodgenca -a
      when: not akmod_cert.stat.exists
      register: kmodgen_task
      tags: [nvidia, cert]

    - name: NVIDIA | Refresh public key status
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: akmod_cert_post
      tags: [nvidia, cert]

    - name: NVIDIA | Check if key is already enrolled
      ansible.builtin.command: mokutil --test-key /etc/pki/akmods/certs/public_key.der
      register: mok_test
      failed_when: false
      changed_when: false
      when: akmod_cert_post.stat.exists
      tags: [nvidia, cert]

    - name: NVIDIA | Import MOK key
      ansible.builtin.pause:
        prompt: "Run 'sudo mokutil --import /etc/pki/akmods/certs/public_key.der' in another terminal to enter the password, then press Enter here to continue."
      when: 
        - not akmod_cert_post.stat.exists or (mok_test.rc is defined and mok_test.rc != 0)
      register: import_task
      tags: [nvidia, cert]

    - name: NVIDIA | Reboot for MOK enrollment
      ansible.builtin.reboot:
        msg: "Rebooting to enroll MOK key. Please select 'Enroll MOK' in the BIOS menu."
      when: import_task is not skipped
      tags: [nvidia, reboot]

    # --- Driver Installation ---
    - name: System | Upgrade all packages before driver installation
      ansible.builtin.dnf:
        name: "*"
        state: latest
      tags: [nvidia, system]

    - name: NVIDIA | Install proprietary driver packages
      ansible.builtin.dnf:
        name: "{{ nvidia_driver_packages }}"
        state: present
      tags: [nvidia, drivers]

    - name: NVIDIA | Build kernel modules (akmods)
      ansible.builtin.command: akmods --force
      tags: [nvidia, build]

    - name: NVIDIA | Regenerate initramfs (dracut)
      ansible.builtin.command: dracut --force
      tags: [nvidia, build]

    # --- Post-Installation Configuration ---
    - name: NVIDIA | Mark akmod-nvidia as user installed
      ansible.builtin.command: dnf mark user akmod-nvidia
      changed_when: false
      tags: [nvidia, config]

    - name: NVIDIA | Install post-install packages (Power, Vulkan, Multimedia)
      ansible.builtin.dnf:
        name: "{{ nvidia_post_install_packages + nvidia_multimedia_packages }}"
        state: present
      tags: [nvidia, config]

    - name: NVIDIA | Enable power management services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: yes
      loop: [nvidia-suspend, nvidia-resume, nvidia-hibernate]
      tags: [nvidia, config]

    - name: NVIDIA | Configure Dynamic Power Management
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: "{{ nvidia_modprobe_conf }}"
        mode: '0644'
      tags: [nvidia, config]

    # --- Zsh Environment Configuration ---
    - name: Shell | Get home directory of the primary user
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_env.SUDO_USER }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      register: primary_user_data
      tags: [nvidia, zsh]

    - name: Shell | Identify target users (Sudo User + Root)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
          - name: "{{ ansible_env.SUDO_USER }}"
            home: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [nvidia, zsh]

    - name: Shell | Identify target users (Root only)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
      when: ansible_env.SUDO_USER is not defined or ansible_env.SUDO_USER == 'root'
      tags: [nvidia, zsh]

    - name: NVIDIA | Set Zsh environment variables for users
      ansible.builtin.blockinfile:
        path: "{{ item.home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED NVIDIA CONFIG"
        block: "{{ nvidia_zsh_env }}"
        owner: "{{ item.name }}"
        insertafter: '^# export MANPATH="/usr/local/man:\$MANPATH"'
      loop: "{{ zsh_users }}"
      tags: [nvidia, zsh]

    - name: NVIDIA | Final reboot after driver installation
      ansible.builtin.reboot:
        msg: "NVIDIA driver installation complete. Rebooting to activate drivers."
      tags: [nvidia, reboot]
