---
- name: Fedora Post-Install Setup - Stage 2 - Software Installation and Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Flatpak Configuration ---
    - name: System | Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
      tags: [system, flatpak]
    
    # --- Kernel Maintenance ---
    - name: Kernel | Prevent removal of debug packages if running debug kernel
      ansible.builtin.fail:
        msg: "You are currently running a DEBUG kernel ({{ ansible_kernel }}). Please boot into a normal kernel before proceeding."
      when: "'debug' in ansible_kernel"
      tags: [system, kernel]

    - name: Kernel | Get list of installed debug kernels
      ansible.builtin.shell: dnf repoquery --installed "kernel*debug*" -q
      register: installed_debug_kernels
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove kernel debug packages
      ansible.builtin.dnf:
        name: "{{ installed_debug_kernels.stdout_lines }}"
        state: absent
      when: installed_debug_kernels.stdout_lines | length > 0
      tags: [system, kernel]

    - name: Kernel | Disable debug repositories
      ansible.builtin.shell: dnf config-manager setopt "*debug*".enabled=0
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Get list of old kernels
      ansible.builtin.shell: dnf repoquery --installonly --latest-limit=-1 -q
      register: old_kernels_list
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove old kernels
      ansible.builtin.dnf:
        name: "{{ old_kernels_list.stdout_lines }}"
        state: absent
      when: old_kernels_list.stdout_lines | length > 0
      tags: [system, kernel]
    
    # --- User Discovery ---
    - name: Shell | Get home directory of the primary user
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_env.SUDO_USER }}"
      register: primary_user_data
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz, hardware, asus, setup]

    # --- Hardware Detection ---
    - name: Hardware | Detect ASUS System
      set_fact:
        is_asus: "{{ (ansible_system_vendor | default('') | lower is search('asus')) or (ansible_board_vendor | default('') | lower is search('asus')) }}"
      tags: [hardware, asus]

    - name: Hardware | Detect GPU Type
      ansible.builtin.shell: lspci | grep -iE "vga|3d|display"
      register: gpu_info
      changed_when: false
      failed_when: false
      tags: [hardware]

    - name: Hardware | Check for Proprietary NVIDIA Driver
      ansible.builtin.command: nvidia-smi
      register: nvidia_smi_check
      changed_when: false
      failed_when: false
      tags: [hardware, detection, nvidia]

    # --- Multimedia Codecs & FFmpeg Swap ---
    - name: Software | Swap ffmpeg-free for full ffmpeg (RPM Fusion)
      ansible.builtin.dnf:
        name: ffmpeg
        allowerasing: yes
        state: present
      tags: [software, multimedia, ffmpeg]

    - name: Software | Install Multimedia Group and Codecs
      ansible.builtin.dnf:
        name: "{{ multimedia_packages }}"
        state: present
        update_cache: yes
      tags: [software, multimedia]

    # --- GPU Specific Hardware Acceleration ---
    - name: Software | Install NVIDIA VA-API and NVENC/NVDEC Support
      ansible.builtin.dnf:
        name: "{{ nvidia_multimedia_packages }}"
        state: present
      when: 
        - gpu_info.stdout | lower | regex_search('\bnvidia\b')
        - nvidia_smi_check.rc == 0
      tags: [software, multimedia, nvidia]

    - name: Hardware | Install Intel Media Drivers
      ansible.builtin.dnf:
        name: "{{ intel_media_packages }}"
        state: present
      when: gpu_info.stdout | lower | regex_search('\bintel\b')
      tags: [hardware, intel]

    - name: Hardware | Install AMD VA-API and VDPAU (Freeworld)
      ansible.builtin.dnf:
        name: "{{ amd_multimedia_packages }}"
        state: present
        allowerasing: yes
      when: gpu_info.stdout | lower | regex_search('\b(amd|ati)\b')
      tags: [hardware, amd]

    # --- ASUS ROG Configuration ---
    - name: Hardware | Enable ASUS ROG Copr Repository
      community.general.copr:
        name: "{{ asus_copr_repo }}"
        state: enabled
      when: is_asus
      tags: [hardware, asus]

    - name: Hardware | Refresh DNF Cache for COPR
      ansible.builtin.dnf:
        update_cache: yes
      when: is_asus
      tags: [hardware, asus]

    - name: Hardware | Install ASUS ROG Packages
      ansible.builtin.dnf:
        name: "{{ asus_packages }}"
        state: present
      when: is_asus
      tags: [hardware, asus]

    - name: Hardware | Enable and Start supergfxd.service
      ansible.builtin.systemd:
        name: supergfxd.service
        enabled: yes
        state: started
      when: is_asus
      tags: [hardware, asus]

    - name: Hardware | Ensure Autostart Directory Exists
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/autostart"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: is_asus and ansible_env.SUDO_USER is defined
      tags: [hardware, asus]

    - name: Hardware | Add ASUS ROG GUI to Autostart
      ansible.builtin.copy:
        src: "/usr/share/applications/rog-control-center.desktop"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/autostart/rog-control-center.desktop"
        remote_src: yes
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_asus and ansible_env.SUDO_USER is defined
      tags: [hardware, asus]
    
    # --- Zsh and Oh-My-Zsh ---
    - name: Shell | Debug User Information
      ansible.builtin.debug:
        msg: 
          - "Current User ID (ansible_user_id): {{ ansible_user_id }}"
          - "Sudo User (ansible_env.SUDO_USER): {{ ansible_env.SUDO_USER | default('None') }}"
      tags: [shell, omz, debug]

    - name: Shell | Install ZSH, Git, and Curl
      ansible.builtin.dnf:
        name: [zsh, git, curl, fira-code-fonts]
        state: present
      tags: [shell, omz]

    - name: Shell | Identify target users (Sudo User + Root)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
          - name: "{{ ansible_env.SUDO_USER }}"
            home: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz]

    - name: Shell | Identify target users (Root only)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
      when: ansible_env.SUDO_USER is not defined or ansible_env.SUDO_USER == 'root'
      tags: [shell, omz]

    - name: Shell | Ensure Oh-My-Zsh is installed for users
      ansible.builtin.shell:
        cmd: "curl -fsSL {{ omz_install_script_url }} | sh -s -- --unattended --keep-zshrc"
        creates: "{{ item.home }}/.oh-my-zsh"
      become_user: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Ensure .zshrc exists (copy template if missing)
      ansible.builtin.copy:
        src: "{{ item.home }}/.oh-my-zsh/templates/zshrc.zsh-template"
        dest: "{{ item.home }}/.zshrc"
        remote_src: yes
        owner: "{{ item.name }}"
        mode: '0644'
        force: no
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Change default shell to ZSH
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: /bin/zsh
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Download custom theme for users
      ansible.builtin.get_url:
        url: "{{ omz_theme_url }}"
        dest: "{{ item.home }}/.oh-my-zsh/themes/{{ omz_theme_name }}.zsh-theme"
        owner: "{{ item.name }}"
        mode: '0644'
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Set theme in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ item.home }}/.zshrc"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="{{ omz_theme_name }}"'
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Add custom aliases to .zshrc
      ansible.builtin.blockinfile:
        path: "{{ item.home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED ALIASES"
        block: "{{ zsh_aliases }}"
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]
    
    # --- Desktop Environment Detection ---
    - name: System | Detect Desktop Environment
      set_fact:
        detected_xdg: "{{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('') | upper }}"
      tags: [system, detection]

    - name: System | Set DE Boolean Facts
      set_fact:
        is_gnome: "{{ 'GNOME' in detected_xdg }}"
        is_kde: "{{ 'KDE' in detected_xdg or 'PLASMA' in detected_xdg or 'KDE' in (ansible_env.XDG_CURRENT_DESKTOP | default('') | upper) }}"
      tags: [system, detection]

    # --- Software Installation ---
    - name: Software | Install Common DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_common }}"
        state: present
      tags: [software, dnf, common]

    - name: Software | Install GNOME Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_gnome }}"
        state: present
      when: is_gnome
      tags: [software, dnf, gnome]

    - name: Software | Install KDE Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_kde }}"
        state: present
      when: is_kde
      tags: [software, dnf, kde]
      
    - name: Software | Add Visual Studio Code Repository
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: "{{ vscode_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ vscode_gpg_key }}"
      tags: [software, vscode]

    - name: Software | Install Visual Studio Code
      ansible.builtin.dnf:
        name: code
        state: present
      tags: [software, vscode]

    - name: Software | Add Brave Browser Repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: Brave Browser
        baseurl: "{{ brave_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ brave_gpg_key }}"
      tags: [software, brave]

    - name: Software | Install Brave Browser
      ansible.builtin.dnf:
        name: brave-browser
        state: present
      tags: [software, brave]
    # --- Font Installation ---
    - name: Software | Install Selected Fonts
      ansible.builtin.dnf:
        name: "{{ fonts_packages }}"
        state: present
      tags: [software, fonts]

    # --- ProtonVPN Installation ---
    - name: Software | Install ProtonVPN Repository
      ansible.builtin.dnf:
        name: "{{ protonvpn_repo_url }}"
        state: present
        disable_gpg_check: yes
      tags: [software, protonvpn]

    - name: Software | Refresh DNF cache for ProtonVPN
      ansible.builtin.command: dnf makecache --refresh
      changed_when: false
      tags: [software, protonvpn]

    - name: Software | Install ProtonVPN Dependencies
      ansible.builtin.dnf:
        name: python3-pip
        state: present
      tags: [software, protonvpn]

    - name: Software | Install ProtonVPN Application
      ansible.builtin.dnf:
        name: proton-vpn-gnome-desktop
        state: present
      register: protonvpn_install
      ignore_errors: yes
      tags: [software, protonvpn]

    - name: Software | Verify ProtonVPN Installation
      ansible.builtin.command: rpm -q proton-vpn-gnome-desktop
      changed_when: false
      failed_when: false
      register: protonvpn_check
      tags: [software, protonvpn]

    - name: Software | Report ProtonVPN Status
      ansible.builtin.debug:
        msg: "ProtonVPN was installed successfully (despite potential scriptlet warnings)."
      when: protonvpn_check.rc == 0
      tags: [software, protonvpn]

    # --- Workspace and Specialized Tools ---

    - name: Shell | Create 'wks' directory in home
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/wks"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, workspace]

    - name: Software | Install GeminiCLI globally
      community.general.npm:
        name: "@google/gemini-cli"
        global: yes
        state: present
      tags: [software, gemini]

    # --- Flatpak Applications ---
    - name: Software | Install Common Flatpak Applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_common }}"
      tags: [software, flatpak, common]

    - name: Software | Install GNOME Specific Flatpak Applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_gnome }}"
      when: is_gnome
      tags: [software, flatpak, gnome]

    - name: Software | Install KDE Specific Flatpak Applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_kde }}"
      when: is_kde
      tags: [software, flatpak, kde]

    # --- System Tweaks ---
    - name: System | Set Hostname
      ansible.builtin.hostname:
        name: "{{ system_hostname }}"
      tags: [system, hostname]

    # --- KDE Specific Configuration ---
    - name: Software | Ensure Konsole directory exists
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: Software | Download Konsole profile
      ansible.builtin.get_url:
        url: "{{ konsole_profile_url }}"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole/kali-like-alt.profile"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: Software | Download Konsole color scheme
      ansible.builtin.get_url:
        url: "{{ konsole_scheme_url }}"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole/kali-like-alt.colorscheme"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: Software | Disable Konsole 'Remember window size'
      community.general.ini_file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/konsolerc"
        section: General
        option: RememberWindowSize
        value: "false"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]
