---
- name: Fedora Post-Install Setup - Stage 2 - Software Installation and Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Flatpak Configuration ---
    - name: System | Enable Flathub Repository
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      tags: [system, flatpak]
    
    # --- Kernel Maintenance ---
    - name: Kernel | Prevent removal of debug packages if running debug kernel
      ansible.builtin.fail:
        msg: "You are currently running a DEBUG kernel ({{ ansible_kernel }}). Please boot into a normal kernel before proceeding."
      when: "'debug' in ansible_kernel"
      tags: [system, kernel]

    - name: Kernel | Get list of installed debug kernels
      ansible.builtin.shell: dnf repoquery --installed "kernel*debug*" -q
      register: installed_debug_kernels
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove kernel debug packages
      ansible.builtin.dnf:
        name: "{{ installed_debug_kernels.stdout_lines }}"
        state: absent
      when: installed_debug_kernels.stdout_lines | length > 0
      tags: [system, kernel]

    - name: Kernel | Disable debug repositories
      ansible.builtin.shell: dnf config-manager setopt "*debug*".enabled=0
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Get list of old kernels
      ansible.builtin.shell: dnf repoquery --installonly --latest-limit=-1 -q
      register: old_kernels_list
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove old kernels
      ansible.builtin.dnf:
        name: "{{ old_kernels_list.stdout_lines }}"
        state: absent
      when: old_kernels_list.stdout_lines | length > 0
      tags: [system, kernel]
    
    # --- Hardware & Drivers ---
    - name: Hardware | Detect GPU Type
      ansible.builtin.shell: lspci | grep -iE "vga|3d|display"
      register: gpu_info
      changed_when: false
      failed_when: false
      tags: [hardware]

    - name: Hardware | Install Intel Media Drivers
      ansible.builtin.dnf:
        name: "{{ intel_media_packages }}"
        state: present
      when: gpu_info.stdout | lower | regex_search('\bintel\b')
      tags: [hardware, intel]

    - name: Hardware | Install AMD VA-API and VDPAU (Freeworld)
      ansible.builtin.dnf:
        name: "{{ amd_multimedia_packages }}"
        state: present
        allowerasing: yes
      when: gpu_info.stdout | lower | regex_search('\b(amd|ati)\b')
      tags: [hardware, amd]
    
    # --- Zsh and Oh-My-Zsh ---
    - name: Shell | Debug User Information
      ansible.builtin.debug:
        msg: 
          - "Current User ID (ansible_user_id): {{ ansible_user_id }}"
          - "Sudo User (ansible_env.SUDO_USER): {{ ansible_env.SUDO_USER | default('None') }}"
      tags: [shell, omz, debug]

    - name: Shell | Install ZSH, Git, and Curl
      ansible.builtin.dnf:
        name: [zsh, git, curl, fira-code-fonts]
        state: present
      tags: [shell, omz]

    - name: Shell | Get home directory of the primary user
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_env.SUDO_USER }}"
      register: primary_user_data
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz]

    - name: Shell | Identify target users (Sudo User + Root)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
          - name: "{{ ansible_env.SUDO_USER }}"
            home: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz]

    - name: Shell | Identify target users (Root only)
      set_fact:
        zsh_users:
          - name: "root"
            home: "/root"
      when: ansible_env.SUDO_USER is not defined or ansible_env.SUDO_USER == 'root'
      tags: [shell, omz]

    - name: Shell | Ensure Oh-My-Zsh is installed for users
      ansible.builtin.shell:
        cmd: "curl -fsSL {{ omz_install_script_url }} | sh -s -- --unattended --keep-zshrc"
        creates: "{{ item.home }}/.oh-my-zsh"
      become_user: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Ensure .zshrc exists (copy template if missing)
      ansible.builtin.copy:
        src: "{{ item.home }}/.oh-my-zsh/templates/zshrc.zsh-template"
        dest: "{{ item.home }}/.zshrc"
        remote_src: yes
        owner: "{{ item.name }}"
        mode: '0644'
        force: no
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Change default shell to ZSH
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: /bin/zsh
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Download custom theme for users
      ansible.builtin.get_url:
        url: "{{ omz_theme_url }}"
        dest: "{{ item.home }}/.oh-my-zsh/themes/{{ omz_theme_name }}.zsh-theme"
        owner: "{{ item.name }}"
        mode: '0644'
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Set theme in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ item.home }}/.zshrc"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="{{ omz_theme_name }}"'
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]

    - name: Shell | Add custom aliases to .zshrc
      ansible.builtin.blockinfile:
        path: "{{ item.home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED ALIASES"
        block: "{{ zsh_aliases }}"
        owner: "{{ item.name }}"
      loop: "{{ zsh_users }}"
      tags: [shell, omz]
    
    # --- Desktop Environment Detection ---
    - name: System | Detect Desktop Environment
      set_fact:
        detected_xdg: "{{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('') | upper }}"
      tags: [system, detection]

    - name: System | Set DE Boolean Facts
      set_fact:
        is_gnome: "{{ 'GNOME' in detected_xdg }}"
        is_kde: "{{ 'KDE' in detected_xdg or 'PLASMA' in detected_xdg or 'KDE' in (ansible_env.XDG_CURRENT_DESKTOP | default('') | upper) }}"
      tags: [system, detection]

    - name: System | Debug DE Detection
      ansible.builtin.debug:
        msg: 
          - "XDG_CURRENT_DESKTOP (lookup): {{ detected_xdg }}"
          - "XDG_CURRENT_DESKTOP (ansible_env): {{ ansible_env.XDG_CURRENT_DESKTOP | default('UNDEFINED') }}"
          - "Is GNOME: {{ is_gnome }}"
          - "Is KDE/Plasma: {{ is_kde }}"
      tags: [system, detection, debug]
    
    # --- DNF Package Installation ---
    - name: Software | Install Common DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_common }}"
        state: present
      tags: [software, dnf, common]

    - name: Software | Install GNOME Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_gnome }}"
        state: present
      when: is_gnome
      tags: [software, dnf, gnome]

    - name: Software | Install KDE Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_kde }}"
        state: present
      when: is_kde
      tags: [software, dnf, kde]

    # --- Font Installation ---
    - name: Software | Install Selected Fonts
      ansible.builtin.dnf:
        name: "{{ fonts_packages }}"
        state: present
      tags: [software, fonts]

    # --- Flatpak Software Installation ---
    - name: Software | Install Common Flatpak Applications
      ansible.builtin.shell: "flatpak install flathub {{ item }} -y"
      loop: "{{ flatpak_apps_common }}"
      register: flatpak_common_install
      changed_when: "'Installing' in flatpak_common_install.stdout"
      tags: [software, flatpak, common]

    - name: Software | Install GNOME Specific Flatpak Applications
      ansible.builtin.shell: "flatpak install flathub {{ item }} -y"
      loop: "{{ flatpak_apps_gnome }}"
      when: is_gnome
      register: flatpak_gnome_install
      changed_when: "'Installing' in flatpak_gnome_install.stdout"
      tags: [software, flatpak, gnome]

    - name: Software | Install KDE Specific Flatpak Applications
      ansible.builtin.shell: "flatpak install flathub {{ item }} -y"
      loop: "{{ flatpak_apps_kde }}"
      when: is_kde
      register: flatpak_kde_install
      changed_when: "'Installing' in flatpak_kde_install.stdout"
      tags: [software, flatpak, kde]