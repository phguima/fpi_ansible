---
- name: Fedora Post-Install Setup - Stage 2 - Software Installation and Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Prerequired tasks ---
    - name: Shell | Get home directory of the primary user
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_env.SUDO_USER }}"
      register: primary_user_data
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, omz, hardware, asus, setup]
    
    - name: System | Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
      tags: [system, flatpak]
    
    - name: Shell | Create 'wks' directory in home
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/wks"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [shell, workspace]
    
    # --- Hardware Detection ---
    - name: Hardware | Detect ASUS system
      set_fact:
        is_asus: "{{ (ansible_system_vendor | default('') | lower is search('asus')) or (ansible_board_vendor | default('') | lower is search('asus')) }}"
      tags: [hardware, asus]

    - name: Hardware | Detect GPU Type
      ansible.builtin.shell: lspci | grep -iE "vga|3d|display"
      register: gpu_info
      changed_when: false
      failed_when: false
      tags: [hardware]

    - name: Hardware | Check for proprietary NVIDIA driver
      ansible.builtin.command: nvidia-smi
      register: nvidia_smi_check
      # We don't want the playbook to stop if nvidia-smi isn't found yet
      ignore_errors: yes 
      changed_when: false
      tags: [hardware, detection, nvidia]
    
    # --- Desktop Environment Detection ---
    - name: System | Detect desktop environment
      set_fact:
        detected_xdg: "{{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('') | upper }}"
      tags: [system, detection]

    - name: System | Set DE Boolean Facts
      set_fact:
        is_gnome: "{{ 'GNOME' in detected_xdg }}"
        is_kde: "{{ 'KDE' in detected_xdg or 'PLASMA' in detected_xdg or 'KDE' in (ansible_env.XDG_CURRENT_DESKTOP | default('') | upper) }}"
      tags: [system, detection]
    
    # --- System Tweaks ---
    - name: System | Set hostname
      ansible.builtin.hostname:
        name: "{{ system_hostname }}"
      tags: [system, hostname]
    
    # --- GPU Specific Hardware Acceleration ---      
    - name: Hardware | Install NVIDIA VA-API and NVENC/NVDEC support
      ansible.builtin.dnf:
        name: "{{ nvidia_multimedia_packages }}"
        state: present
      when: 
        - gpu_info.stdout is search('NVIDIA', ignorecase=True)
        - nvidia_smi_check.rc == 0
      tags: [software, multimedia, nvidia]

    - name: Hardware | Install intel media drivers
      ansible.builtin.dnf:
        name: "{{ intel_media_packages }}"
        state: present
      when: gpu_info.stdout is search('Intel', ignorecase=True)
      tags: [hardware, intel]

    - name: Hardware | Install AMD VA-API and VDPAU (Freeworld)
      ansible.builtin.dnf:
        name: "{{ amd_multimedia_packages }}"
        state: present
        allowerasing: true
      when: gpu_info.stdout | lower | regex_search('\b(amd|ati|Advanced Micro Devices)\b')
      tags: [hardware, amd]
    
    # --- Multimedia Codecs & FFmpeg Swap ---
    - name: Codecs | Swap ffmpeg-free for full ffmpeg (RPM Fusion)
      ansible.builtin.dnf:
        name: ffmpeg
        allowerasing: yes
        state: present
      tags: [software, multimedia, ffmpeg]

    - name: Codecs | Install Multimedia Group and Codecs
      ansible.builtin.dnf:
        name: "{{ multimedia_packages }}"
        state: present
        update_cache: yes
      tags: [software, multimedia]
    
    # --- NVIDIA Power Management Configuration ---
    - name: Hardware | Configure NVIDIA Power Management
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: |
          # Enable deep power management
          options nvidia NVreg_DynamicPowerManagement=0x02
          options nvidia NVreg_EnableS0ixPowerManagement=1

          # Improve suspend/resume stability (Fedora uses tmpfs for /tmp)
          options nvidia NVreg_TemporaryFilePath=/var/tmp
        owner: root
        group: root
        mode: '0644'
      when: 
        - gpu_info.stdout is search('NVIDIA', ignorecase=True)
        - nvidia_smi_check.rc == 0
      tags: [hardware, nvidia, power]
    
    # --- Kernel Maintenance ---
    - name: Kernel | Prevent removal of debug packages if running debug kernel
      ansible.builtin.fail:
        msg: "You are currently running a DEBUG kernel ({{ ansible_kernel }}). Please boot into a normal kernel before proceeding."
      when: "'debug' in ansible_kernel"
      tags: [system, kernel]

    - name: Kernel | Get list of installed debug kernels
      ansible.builtin.shell: dnf repoquery --installed "kernel*debug*" -q
      register: installed_debug_kernels
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove kernel debug packages
      ansible.builtin.dnf:
        name: "{{ installed_debug_kernels.stdout_lines }}"
        state: absent
      when: installed_debug_kernels.stdout_lines | length > 0
      tags: [system, kernel]

    - name: Kernel | Disable debug repositories
      ansible.builtin.shell: dnf config-manager setopt "*debug*".enabled=0
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Get list of old kernels
      ansible.builtin.shell: dnf repoquery --installonly --latest-limit=-1 -q
      register: old_kernels_list
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove old kernels
      ansible.builtin.dnf:
        name: "{{ old_kernels_list.stdout_lines }}"
        state: absent
      when: old_kernels_list.stdout_lines | length > 0
      tags: [system, kernel]
    
    # --- Fonts Installation ---
    - name: Software | Install Selected Fonts
      ansible.builtin.dnf:
        name: "{{ fonts_packages }}"
        state: present
      tags: [software, fonts]
    
    # --- ASUS ROG Installation ---
    - name: ASUS | Enable ROG copr repository
      community.general.copr:
        name: "{{ asus_copr_repo }}"
        state: enabled
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Refresh DNF cache for copr
      ansible.builtin.dnf:
        update_cache: yes
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Install ASUS ROG packages
      ansible.builtin.dnf:
        name: "{{ asus_packages }}"
        state: present
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Enable and start supergfxd.service
      ansible.builtin.systemd:
        name: supergfxd.service
        enabled: yes
        state: started
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Ensure autostart directory exists
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/autostart"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: is_asus and ansible_env.SUDO_USER is defined
      tags: [hardware, asus]

    - name: ASUS | Add ASUS ROG GUI to autostart
      ansible.builtin.copy:
        src: "/usr/share/applications/rog-control-center.desktop"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/autostart/rog-control-center.desktop"
        remote_src: yes
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_asus and ansible_env.SUDO_USER is defined
      tags: [hardware, asus]
    
    # --- Software Installation ---
    - name: Software | Install KDE specific DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_kde }}"
        state: present
      when: is_kde
      tags: [software, dnf, kde]
    
    - name: Software | Install GNOME specific DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_gnome }}"
        state: present
      when: is_gnome
      tags: [software, dnf, gnome]
    
    - name: Software | Install DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_common }}"
        state: present
      tags: [software, dnf, common]
    
    # --- Brave Installation ---
    - name: Brave | Add Brave repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: Brave Browser
        baseurl: "{{ brave_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ brave_gpg_key }}"
      tags: [software, brave]

    - name: Brave | Install Brave
      ansible.builtin.dnf:
        name: brave-browser
        state: present
      tags: [software, brave]
    
    # --- Visual Studio Code Installation ---
    - name: VSCode | Add Visual Studio Code repository
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: "{{ vscode_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ vscode_gpg_key }}"
      tags: [software, vscode]

    - name: VSCode | Install Visual Studio Code
      ansible.builtin.dnf:
        name: code
        state: present
      tags: [software, vscode]
    
    # --- GeminiCLI Installation ---
    - name: Software | Install GeminiCLI globally
      community.general.npm:
        name: "@google/gemini-cli"
        global: yes
        state: present
      tags: [software, gemini]
    
    - name: Software | Install GeminiCLI extensions for primary user
      ansible.builtin.command:
        cmd: "gemini extensions install --consent {{ item.url }}"
      become_user: "{{ ansible_env.SUDO_USER }}"
      loop:
        - { name: 'chrome-devtools', url: 'https://github.com/ChromeDevTools/chrome-devtools-mcp' }
        - { name: 'code-review', url: 'https://github.com/gemini-cli-extensions/code-review' }
        - { name: 'criticalthink', url: 'https://github.com/abagames/slash-criticalthink' }
        - { name: 'gemini-cli-jules', url: 'https://github.com/gemini-cli-extensions/jules' }
        - { name: 'gemini-cli-security', url: 'https://github.com/gemini-cli-extensions/security' }
        - { name: 'github', url: 'https://github.com/github/github-mcp-server' }
        - { name: 'google-workspace', url: 'https://github.com/gemini-cli-extensions/workspace' }
      register: extension_install
      changed_when: "'is already installed' not in extension_install.stdout"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [gemini, extensions]

     # --- ProtonVPN Installation ---
    - name: ProtonVPN | Install ProtonVPN repository
      ansible.builtin.dnf:
        name: "{{ protonvpn_repo_url }}"
        state: present
        disable_gpg_check: yes
      tags: [software, protonvpn]

    - name: ProtonVPN | Refresh DNF cache for ProtonVPN
      ansible.builtin.command: dnf makecache --refresh
      changed_when: false
      tags: [software, protonvpn]

    - name: ProtonVPN | Install ProtonVPN dependencies
      ansible.builtin.dnf:
        name: python3-pip
        state: present
      tags: [software, protonvpn]

    - name: ProtonVPN | Install ProtonVPN application
      ansible.builtin.dnf:
        name: proton-vpn-gnome-desktop
        state: present
      register: protonvpn_install
      ignore_errors: yes
      tags: [software, protonvpn]

    - name: ProtonVPN | Verify ProtonVPN installation
      ansible.builtin.command: rpm -q proton-vpn-gnome-desktop
      changed_when: false
      failed_when: false
      register: protonvpn_check
      tags: [software, protonvpn]

    - name: ProtonVPN | Report ProtonVPN status
      ansible.builtin.debug:
        msg: "ProtonVPN was installed successfully (despite potential scriptlet warnings)."
      when: protonvpn_check.rc == 0
      tags: [software, protonvpn]
    
    # --- Flatpak Applications ---
    - name: Software | Install KDE specific flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_kde }}"
      when: is_kde
      tags: [software, flatpak, kde]

    - name: Software | Install GNOME specific flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_gnome }}"
      when: is_gnome
      tags: [software, flatpak, gnome]

    - name: Software | Install flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_common }}"
      tags: [software, flatpak, common]
    
    # --- Cedilla Configuration ---
    - name: Cedilla | Set user facts
      set_fact:
        user_name: "{{ ansible_env.SUDO_USER }}"
        user_home: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}"
      when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'
      tags: [always]
    
    - name: Cedilla | Find system compose file
      ansible.builtin.shell: |
        LANG_VAL=${LANG:=en_US.UTF-8}
        COMPOSE_DIR="/usr/share/X11/locale"
        sed -ne "s/^\([^:]*\):[ \t]*$LANG_VAL/\1/p" <"${COMPOSE_DIR}/compose.dir" | head -1
      register: system_compose_name
      changed_when: false
      tags: [system, cedilla]

    - name: Cedilla | Apply fix to .XCompose
      ansible.builtin.shell: |
        SYSTEM_COMPOSE="/usr/share/X11/locale/{{ system_compose_name.stdout }}"
        USER_COMPOSE="{{ user_home }}/.XCompose"
        
        # Check if the file already contains cedilla-c instead of accented-c
        if [ -f "$USER_COMPOSE" ] && grep -q $'\xc3\xa7' "$USER_COMPOSE"; then
          exit 0
        fi

        if [ ! -s "$SYSTEM_COMPOSE" ]; then
          echo "Error: System compose file not found."
          exit 1
        fi

        if [ -s "$USER_COMPOSE" ] && [ ! -f "$USER_COMPOSE.ORIGINAL" ]; then
          cp -f "$USER_COMPOSE" "$USER_COMPOSE.ORIGINAL"
        fi

        sed -e 's/\xc4\x87/\xc3\xa7/g' -e 's/\xc4\x86/\xc3\x87/g' <"$SYSTEM_COMPOSE" >"$USER_COMPOSE"
        chown {{ user_name }}:{{ user_name }} "$USER_COMPOSE"
        chmod 0644 "$USER_COMPOSE"
        echo "XCOMPOSE_CHANGED"
      register: xcompose_result
      changed_when: "'XCOMPOSE_CHANGED' in xcompose_result.stdout"
      when: 
        - system_compose_name.stdout != ""
        - user_home is defined
      args:
        executable: /bin/bash
      tags: [system, cedilla]

    - name: Cedilla | Apply Flatpak overrides for Bitwarden (KDE)
      ansible.builtin.command:
        cmd: "flatpak override --user --env=GTK_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 com.bitwarden.desktop"
      become_user: "{{ user_name }}"
      register: bitwarden_override_kde
      failed_when: false
      changed_when: false
      tags: [system, cedilla, flatpak]
    
    - name: Cedilla | Apply Flatpak overrides for Zoom (KDE)
      ansible.builtin.command:
        cmd: "flatpak override --user --env=GTK_IM_MODULE=cedilla --env=QT_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 --filesystem=home us.zoom.Zoom"
      become_user: "{{ user_name }}"
      register: zoom_override
      failed_when: false
      changed_when: false
      tags: [system, zoom, cedilla, flatpak]

    - name: Cedilla | Ensure local applications directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.local/share/applications"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0755'
      tags: [brave, cedilla]

    - name: Cedilla | Copy Brave desktop file to local share
      ansible.builtin.copy:
        src: /usr/share/applications/brave-browser.desktop
        dest: "{{ user_home }}/.local/share/applications/brave-browser.desktop"
        remote_src: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0644'
        force: no
      tags: [brave, cedilla]

    - name: Cedilla | Configure Brave to use X11 ozone platform
      ansible.builtin.replace:
        path: "{{ user_home }}/.local/share/applications/brave-browser.desktop"
        regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
        replace: 'Exec=\1 --ozone-platform=x11\2'
      tags: [brave, cedilla]

    - name: Cedilla | Copy Chromium desktop file to local share
      ansible.builtin.copy:
        src: /usr/share/applications/chromium-browser.desktop
        dest: "{{ user_home }}/.local/share/applications/chromium-browser.desktop"
        remote_src: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0644'
        force: no
      tags: [chromium, cedilla]

    - name: Cedilla | Configure Chromium to use X11 ozone platform
      ansible.builtin.replace:
        path: "{{ user_home }}/.local/share/applications/chromium-browser.desktop"
        regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
        replace: 'Exec=\1 --ozone-platform=x11\2'
      tags: [chromium, cedilla]

    - name: Cedilla | Update desktop database
      ansible.builtin.command:
        cmd: "update-desktop-database {{ user_home }}/.local/share/applications/"
      become_user: "{{ user_name }}"
      changed_when: false
      tags: [brave, chromium, cedilla]

    - name: Cedilla | Display completion message
      ansible.builtin.debug:
        msg: 
          - "Cedilla fix applied to {{ user_home }}/.XCompose."
          - "Please log out of your session and re-login to effect changes."
      tags: [system, cedilla]

    # --- KDE Specific Configuration ---
    - name: KDE | Ensure konsole directory exists
      ansible.builtin.file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole"
        state: directory
        owner: "{{ ansible_env.SUDO_USER }}"
        group: "{{ ansible_env.SUDO_USER }}"
        mode: '0755'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: KDE | Download konsole profile
      ansible.builtin.get_url:
        url: "{{ konsole_profile_url }}"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole/kali-like-alt.profile"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: KDE | Download konsole color scheme
      ansible.builtin.get_url:
        url: "{{ konsole_scheme_url }}"
        dest: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.local/share/konsole/kali-like-alt.colorscheme"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: KDE | Disable konsole 'Remember window size'
      community.general.ini_file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/konsolerc"
        section: "KonsoleWindow"
        option: RememberWindowSize
        value: "false"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    - name: KDE | Set default konsole profile
      community.general.ini_file:
        path: "{{ primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] }}/.config/konsolerc"
        section: "Desktop Entry"
        option: DefaultProfile
        value: "kali-like-alt.profile"
        owner: "{{ ansible_env.SUDO_USER }}"
        mode: '0644'
      when: is_kde and ansible_env.SUDO_USER is defined
      tags: [software, kde, konsole]

    # --- GNOME Specific Configuration (PTYxis) ---
    - name: GNOME | Set PTYxis terminal window size and behavior
      ansible.builtin.command: "gsettings set org.gnome.Ptyxis {{ item.key }} {{ item.value }}"
      become_user: "{{ ansible_env.SUDO_USER }}"
      loop:
        - { key: "restore-window-size", value: "{{ ptyxis_restore_window_size }}" }
        - { key: "default-columns", value: "{{ ptyxis_default_columns }}" }
        - { key: "default-rows", value: "{{ ptyxis_default_rows }}" }
      when: is_gnome and ansible_env.SUDO_USER is defined
      tags: [software, gnome, ptyxis]

    - name: GNOME | Set PTYxis cursor and font settings
      ansible.builtin.command: "dconf write /org/gnome/Ptyxis/{{ item.key }} \"{{ item.value }}\""
      become_user: "{{ ansible_env.SUDO_USER }}"
      loop:
        - { key: "cursor-shape", value: "'{{ ptyxis_cursor_shape }}'" }
        - { key: "cursor-blink-mode", value: "'{{ ptyxis_cursor_blink_mode }}'" }
        - { key: "use-system-font", value: "{{ ptyxis_use_system_font }}" }
        - { key: "font-name", value: "'{{ ptyxis_font_name }}'" }
      when: is_gnome and ansible_env.SUDO_USER is defined
      tags: [software, gnome, ptyxis]

    - name: GNOME | Get PTYxis default profile UUID
      ansible.builtin.shell: dconf read /org/gnome/Ptyxis/default-profile-uuid | tr -d "'"
      register: ptyxis_default_uuid
      become_user: "{{ ansible_env.SUDO_USER }}"
      changed_when: false
      when: is_gnome and ansible_env.SUDO_USER is defined
      tags: [software, gnome, ptyxis]

    - name: GNOME | Set PTYxis transparency
      ansible.builtin.command: "dconf write /org/gnome/Ptyxis/Profiles/{{ ptyxis_default_uuid.stdout }}/opacity {{ ptyxis_opacity }}"
      become_user: "{{ ansible_env.SUDO_USER }}"
      when: 
        - is_gnome 
        - ansible_env.SUDO_USER is defined 
        - ptyxis_default_uuid.stdout != ""
      tags: [software, gnome, ptyxis]

    # --- Python Libraries ---
    - name: Python | Install markitdown globally
      ansible.builtin.pip:
        name: markitdown
        state: present
        executable: pip3
      become: yes
      tags: [software, python, markitdown]

    - name: Python | Install markitdown[pdf] globally
      ansible.builtin.pip:
        name: markitdown[pdf]
        state: present
        executable: pip3
      become: yes
      tags: [software, python, markitdown]
    
    - name: Python | Install markitdown[docx] globally
      ansible.builtin.pip:
        name: markitdown[docx]
        state: present
        executable: pip3
      become: yes
      tags: [software, python, markitdown]
