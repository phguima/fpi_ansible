---
- name: Fedora Post-Install Setup - Stage 3: Software Installation
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    # --- Desktop Environment Detection ---
    - name: System | Detect Desktop Environment
      set_fact:
        detected_xdg: "{{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('') | upper }}"
      tags: [system, detection]

    - name: System | Set DE Boolean Facts
      set_fact:
        is_gnome: "{{ 'GNOME' in detected_xdg }}"
        is_kde: "{{ 'KDE' in detected_xdg or 'PLASMA' in detected_xdg or 'KDE' in (ansible_env.XDG_CURRENT_DESKTOP | default('') | upper) }}"
      tags: [system, detection]

    - name: System | Debug DE Detection
      ansible.builtin.debug:
        msg: 
          - "XDG_CURRENT_DESKTOP (lookup): {{ detected_xdg }}"
          - "XDG_CURRENT_DESKTOP (ansible_env): {{ ansible_env.XDG_CURRENT_DESKTOP | default('UNDEFINED') }}"
          - "Is GNOME: {{ is_gnome }}"
          - "Is KDE/Plasma: {{ is_kde }}"
      tags: [system, detection, debug]

    # --- DNF Package Installation ---
    - name: Software | Install Common DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_common }}"
        state: present
      tags: [software, dnf, common]

    - name: Software | Install GNOME Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_gnome }}"
        state: present
      when: is_gnome
      tags: [software, dnf, gnome]

    - name: Software | Install KDE Specific DNF Packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_kde }}"
        state: present
      when: is_kde
      tags: [software, dnf, kde]

    # --- Font Installation ---
    - name: Software | Install Selected Fonts
      ansible.builtin.dnf:
        name: "{{ fonts_packages }}"
        state: present
      tags: [software, fonts]

    # --- Multimedia Codecs & FFmpeg Swap ---
    - name: Software | Swap ffmpeg-free for full ffmpeg (RPM Fusion)
      ansible.builtin.dnf:
        name: ffmpeg
        allowerasing: yes
        state: present
      tags: [software, multimedia, ffmpeg]

    - name: Software | Install Multimedia Group and Codecs
      ansible.builtin.dnf:
        name:
          - "@multimedia"
          - gstreamer1-plugins-bad-free-extras
          - gstreamer1-plugins-bad-freeworld
          - gstreamer1-plugins-ugly
          - gstreamer1-libav
        state: present
      tags: [software, multimedia]

    - name: Software | Install NVIDIA VA-API Driver
      ansible.builtin.dnf:
        name: libva-nvidia-driver
        state: present
      # We need a re-detection here if stage 2 hasn't run or if we're running standalone
      # But usually stage 2 should have run. To be safe, we can add a check.
      tags: [software, multimedia, nvidia]
