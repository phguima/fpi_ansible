---
- name: Fedora Post-Install Setup
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    - name: Bootstrap | Upgrade all packages and refresh dnf cache
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes
      become: true
      tags: [system, bootstrap]

    - name: Bootstrap | Install dnf-plugins-core
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      tags: [system, bootstrap]
    
    # --- DNF Configuration ---
    - name: System | Optimize DNF Configuration
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        line: "{{ item.key }}={{ item.value }}"
        state: present
      loop:
        - { key: "max_parallel_downloads", value: "{{ dnf_max_parallel_downloads }}" }
        - { key: "fastestmirror", value: "{{ dnf_fastestmirror }}" }
      tags: [system, dnf]
    
    # --- Repositories ---
    - name: System | Add RPM Fusion Free repository
      ansible.builtin.dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes
      tags: [system, rpmfusion] 

    - name: System | Enable Flathub Repository
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      tags: [system, flatpak]

    # --- Hardware & Drivers ---
    - name: Hardware | Detect GPU Type
      ansible.builtin.shell: lspci | grep -iE "vga|3d"
      register: gpu_info
      changed_when: false
      tags: [hardware]
